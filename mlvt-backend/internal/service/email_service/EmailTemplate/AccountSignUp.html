<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Verify Your Email</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f9f9f9;
                padding: 20px;
            }
            .container {
                background-color: #fff;
                padding: 30px;
                border-radius: 10px;
                max-width: 600px;
                margin: auto;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            h2 {
                color: #333;
            }
            .token-box {
                background-color: #ccc;
                border: 1px solid #ccc;
                padding: 15px;
                border-radius: 8px;
                font-family: monospace;
                word-break: break-all;
            }
            .footer {
                margin-top: 20px;
                font-size: 12px;
                color: #888;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Hi {{.Username}},</h2>
            <p>Thank you for signing up. Please verify your email address by using the token below:</p>

            <div class="token-box">{{.Token}}</div>

            <p>Once verified, your account will be activated.</p>

            <div class="footer">If you did not request this, please ignore this email.</div>
        </div>
    </body>
</html>
