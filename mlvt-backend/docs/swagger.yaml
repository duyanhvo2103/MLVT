definitions:
  entity.Audio:
    properties:
      created_at:
        description: Timestamp of when the audio was uploaded
        type: string
      duration:
        description: Duration of the audio in seconds
        type: integer
      file_name:
        description: The audio file name in S3
        type: string
      folder:
        description: S3 folder or path containing the audio file
        type: string
      id:
        type: integer
      lang:
        description: Language of the audio (e.g., "en", "es", etc.)
        type: string
      status:
        $ref: '#/definitions/entity.StatusEntity'
      transcription_id:
        type: integer
      updated_at:
        description: Timestamp of the last update to the audio
        type: string
      user_id:
        description: ID of the user who uploaded the audio
        type: integer
      video_id:
        description: ID of the related video
        type: integer
    type: object
  entity.PremiumUser:
    properties:
      expired_at:
        type: string
      user_id:
        type: integer
    type: object
  entity.StatusEntity:
    enum:
    - raw
    - processing
    - succeeded
    - failed
    type: string
    x-enum-varnames:
    - StatusRaw
    - StatusProcessing
    - StatusSucceeded
    - StatusFailed
  entity.TokenClaim:
    properties:
      claimed_date:
        type: string
      created_at:
        type: string
      id:
        type: integer
      tokens:
        type: integer
      user_id:
        type: integer
    type: object
  entity.Transcription:
    properties:
      created_at:
        description: Timestamp of when the transcription was created
        type: string
      file_name:
        description: The transcription file name in S3
        type: string
      folder:
        description: S3 folder or path containing the transcription file
        type: string
      id:
        type: integer
      lang:
        description: Language of the transcription (e.g., "en", "es", etc.)
        type: string
      original_transcription_id:
        type: integer
      status:
        $ref: '#/definitions/entity.StatusEntity'
      text:
        description: The transcription text
        type: string
      updated_at:
        description: Timestamp of the last update to the transcription
        type: string
      user_id:
        description: ID of the user who created the transcription
        type: integer
      video_id:
        description: ID of the related video
        type: integer
    type: object
  entity.User:
    properties:
      avatar:
        description: file name
        type: string
      avatar_folder:
        description: Folder that contain the avatar image on s3
        type: string
      created_at:
        description: Timestamp of when the user was created
        type: string
      email:
        description: User's email address
        type: string
      first_name:
        description: User's first name
        type: string
      id:
        description: Unique identifier for the user
        type: integer
      last_name:
        description: User's last name\
        type: string
      password:
        description: User's hashed password
        type: string
      role:
        allOf:
        - $ref: '#/definitions/entity.UserPermission'
        description: Role of the user (User, Admin, etc.)
      status:
        allOf:
        - $ref: '#/definitions/entity.UserStatus'
        description: Status of the user (available, suspended, deleted)
      updated_at:
        description: Timestamp of the last update to the user's data
        type: string
      username:
        type: string
      wallet_balance:
        type: integer
    type: object
  entity.UserPermission:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - AdminRole
    - UserRole
  entity.UserStatus:
    enum:
    - active
    - inactive
    type: string
    x-enum-varnames:
    - UserStatusActive
    - UserStatusInactive
  entity.Video:
    properties:
      audio_id:
        type: integer
      created_at:
        description: Timestamp of when the video was created
        type: string
      description:
        type: string
      duration:
        description: Duration of the video in seconds
        type: integer
      file_name:
        type: string
      folder:
        type: string
      id:
        type: integer
      image:
        type: string
      original_video_id:
        type: integer
      status:
        $ref: '#/definitions/entity.StatusEntity'
      title:
        type: string
      updated_at:
        description: Timestamp of the last update to the video
        type: string
      user_id:
        description: ID of the user who uploaded the video
        type: integer
    type: object
  entity.VoucherCode:
    properties:
      code:
        type: string
      created_at:
        type: string
      expired_time:
        type: string
      id:
        type: string
      max_usage:
        type: integer
      token:
        type: integer
      updated_at:
        type: string
      used_count:
        type: integer
    type: object
  media_handler.UpdateTranscriptionStatusRequest:
    properties:
      status:
        $ref: '#/definitions/entity.StatusEntity'
    type: object
  media_handler.UpdateVideoStatusRequest:
    properties:
      status:
        $ref: '#/definitions/entity.StatusEntity'
    type: object
  response.AudioResponse:
    properties:
      audio:
        $ref: '#/definitions/entity.Audio'
      download_url:
        type: string
    type: object
  response.AudiosResponse:
    properties:
      audios:
        items:
          $ref: '#/definitions/entity.Audio'
        type: array
    type: object
  response.AvatarDownloadURLResponse:
    properties:
      avatar_download_url:
        type: string
    type: object
  response.AvatarUploadURLResponse:
    properties:
      avatar_upload_url:
        type: string
    type: object
  response.DailyTokenClaimsResponse:
    properties:
      claims:
        items:
          $ref: '#/definitions/entity.TokenClaim'
        type: array
    type: object
  response.DownloadURLResponse:
    properties:
      download_url:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  response.MessageCreateResponseWithID:
    properties:
      id: {}
      message:
        type: string
    type: object
  response.MessageResponse:
    properties:
      message:
        type: string
    type: object
  response.PremiumUsersResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/entity.PremiumUser'
        type: array
    type: object
  response.StatusResponse:
    properties:
      status:
        $ref: '#/definitions/entity.StatusEntity'
    type: object
  response.TokenResponse:
    properties:
      role:
        $ref: '#/definitions/entity.UserPermission'
      token:
        type: string
      user_id:
        type: integer
    type: object
  response.TranscriptionResponse:
    properties:
      download_url:
        type: string
      transcription:
        $ref: '#/definitions/entity.Transcription'
    type: object
  response.TranscriptionsResponse:
    properties:
      transcriptions:
        items:
          $ref: '#/definitions/entity.Transcription'
        type: array
    type: object
  response.UploadURLResponse:
    properties:
      upload_url:
        type: string
    type: object
  response.UserResponse:
    properties:
      user:
        $ref: '#/definitions/entity.User'
    type: object
  response.UsersResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/entity.User'
        type: array
    type: object
info:
  contact: {}
paths:
  /audios:
    post:
      consumes:
      - application/json
      description: Adds a new audio file's metadata to the system.
      parameters:
      - description: Audio object
        in: body
        name: audio
        required: true
        schema:
          $ref: '#/definitions/entity.Audio'
      produces:
      - application/json
      responses:
        "201":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Add audio
      tags:
      - audios
  /audios/{audio_id}:
    delete:
      description: Deletes an audio file from the system.
      parameters:
      - description: ID of the audio file
        in: path
        name: audio_id
        required: true
        type: integer
      responses:
        "200":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Delete audio by ID
      tags:
      - audios
    get:
      description: Retrieves an audio file's metadata and generates a presigned download
        URL.
      parameters:
      - description: ID of the audio file
        in: path
        name: audio_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: audio, download_url
          schema:
            $ref: '#/definitions/response.AudioResponse'
        "404":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get audio by ID
      tags:
      - audios
  /audios/{audio_id}/download-url:
    get:
      description: Generates a presigned URL to download an audio file from the storage
        service.
      parameters:
      - description: ID of the audio file
        in: path
        name: audio_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: download_url
          schema:
            $ref: '#/definitions/response.DownloadURLResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Generate presigned download URL
      tags:
      - audios
  /audios/{audio_id}/user/{user_id}:
    get:
      description: Retrieves an audio file for a specific user and generates a presigned
        download URL.
      parameters:
      - description: ID of the audio file
        in: path
        name: audio_id
        required: true
        type: integer
      - description: ID of the user
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: audio, download_url
          schema:
            $ref: '#/definitions/response.AudioResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get audio by user and audio ID
      tags:
      - audios
  /audios/{audio_id}/video/{video_id}:
    get:
      description: Retrieves an audio file for a specific video and generates a presigned
        download URL.
      parameters:
      - description: ID of the audio file
        in: path
        name: audio_id
        required: true
        type: integer
      - description: ID of the video
        in: path
        name: video_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: audio, download_url
          schema:
            $ref: '#/definitions/response.AudioResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get audio by video and audio ID
      tags:
      - audios
  /audios/generate-upload-url:
    get:
      description: Generates a presigned URL to upload an audio file to the storage
        service.
      parameters:
      - description: Name of the file to be uploaded
        in: query
        name: file_name
        required: true
        type: string
      - description: MIME type of the file (e.g., audio/mpeg)
        in: query
        name: file_type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: upload_url
          schema:
            $ref: '#/definitions/response.UploadURLResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Generate presigned upload URL
      tags:
      - audios
  /audios/process/{transcription_id}:
    post:
      consumes:
      - application/json
      description: Converts a transcription to audio using text-to-speech processing
        asynchronously
      parameters:
      - description: Transcription ID
        in: path
        name: transcription_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: Accepted for processing
          schema:
            $ref: '#/definitions/response.MessageCreateResponseWithID'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Convert transcription to speech asynchronously
      tags:
      - audios
  /audios/user/{user_id}:
    get:
      description: Retrieves all audio files belonging to a specific user.
      parameters:
      - description: ID of the user
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: audios
          schema:
            $ref: '#/definitions/response.AudiosResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List audios by user ID
      tags:
      - audios
  /audios/video/{video_id}:
    get:
      description: Retrieves all audio files belonging to a specific video.
      parameters:
      - description: ID of the video
        in: path
        name: video_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: audios
          schema:
            $ref: '#/definitions/response.AudiosResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List audios by Video ID
      tags:
      - audios
  /lipsync/{video_id}/{audio_id}:
    post:
      consumes:
      - application/json
      description: Synchronizes lip movements in a video based on an audio track asynchronously
      parameters:
      - description: Video ID
        in: path
        name: video_id
        required: true
        type: integer
      - description: Audio ID
        in: path
        name: audio_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: Accepted for processing
          schema:
            $ref: '#/definitions/response.MessageCreateResponseWithID'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Perform lip synchronization asynchronously
      tags:
      - lipsync
  /pipeline/full/{video_id}:
    post:
      consumes:
      - application/json
      description: 'Processes a video through the full pipeline: Speech-to-Text, Text-to-Text,
        Text-to-Speech, and Lip Sync asynchronously'
      parameters:
      - description: Video ID
        in: path
        name: video_id
        required: true
        type: integer
      - description: Source language code
        in: query
        name: source_language
        required: true
        type: string
      - description: Target language code
        in: query
        name: target_language
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted for processing
          schema:
            $ref: '#/definitions/response.MessageCreateResponseWithID'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Process full pipeline asynchronously
      tags:
      - pipeline
  /premium/{user_id}:
    get:
      description: Returns whether the user is premium and their expiry time
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'example: {\"premium\": true}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid user_id
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Check premium status of a user
      tags:
      - tokens
  /premium/add:
    post:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: invalid or missing user_id
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Grant 30-day premium to a user
      tags:
      - tokens
  /premium/list:
    get:
      description: Returns users with premium expiry time in the future
      produces:
      - application/json
      responses:
        "200":
          description: users
          schema:
            $ref: '#/definitions/response.PremiumUsersResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List all active premium users
      tags:
      - tokens
  /progress/{user_id}:
    get:
      consumes:
      - application/json
      description: Retrieves the progress data for a specified user by user ID
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'A JSON object containing progress data. Key: ''progresses'''
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get user progress
      tags:
      - Progress
  /token/claims:
    get:
      description: Retrieves all claim logs, ordered by newest first
      produces:
      - application/json
      responses:
        "200":
          description: claims
          schema:
            $ref: '#/definitions/response.DailyTokenClaimsResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List all daily token claim records
      tags:
      - tokens
  /token/daily:
    post:
      consumes:
      - application/json
      description: Adds 5 tokens to the user's wallet if not yet claimed today
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: invalid or already claimed
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Claim daily free tokens
      tags:
      - tokens
  /token/premium:
    post:
      consumes:
      - application/json
      description: Adds 20 tokens to the user's wallet if premium and not yet claimed
        today
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: not premium or already claimed
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Claim daily premium tokens
      tags:
      - tokens
  /transcriptions:
    post:
      consumes:
      - application/json
      description: Adds a new transcription file's metadata to the system.
      parameters:
      - description: Transcription object
        in: body
        name: transcription
        required: true
        schema:
          $ref: '#/definitions/entity.Transcription'
      produces:
      - application/json
      responses:
        "201":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Add transcription
      tags:
      - transcriptions
  /transcriptions/{transcription_id}:
    delete:
      description: Deletes a transcription record from the system.
      parameters:
      - description: ID of the transcription file
        in: path
        name: transcription_id
        required: true
        type: integer
      responses:
        "200":
          description: message
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Delete transcription by ID
      tags:
      - transcriptions
    get:
      description: Retrieves a transcription and generates a presigned download URL
        for it.
      parameters:
      - description: ID of the transcription file
        in: path
        name: transcription_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: transcription, download_url
          schema:
            $ref: '#/definitions/response.TranscriptionResponse'
        "404":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get transcription by ID
      tags:
      - transcriptions
  /transcriptions/{transcription_id}/download-url:
    get:
      description: Generates a presigned URL to download a transcription file from
        the storage service.
      parameters:
      - description: ID of the transcription file
        in: path
        name: transcription_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: download_url
          schema:
            $ref: '#/definitions/response.DownloadURLResponse'
        "400":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Generate presigned download URL
      tags:
      - transcriptions
  /transcriptions/{transcription_id}/status:
    put:
      consumes:
      - application/json
      description: Update the status of a specific Transcription by its ID
      parameters:
      - description: Transcription ID
        in: path
        name: transcription_id
        required: true
        type: integer
      - description: New status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/media_handler.UpdateTranscriptionStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Update the status of a transcription
      tags:
      - transcriptions
  /transcriptions/{transcriptionID}/user/{userID}:
    get:
      description: Retrieves a transcription for a specific user and generates a presigned
        download URL.
      parameters:
      - description: ID of the transcription file
        in: path
        name: transcriptionID
        required: true
        type: integer
      - description: ID of the user
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: transcription, download_url
          schema:
            $ref: '#/definitions/response.TranscriptionResponse'
        "500":
          description: error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get transcription by User ID and transcription ID
      tags:
      - transcriptions
  /transcriptions/{transcriptionID}/video/{videoID}:
    get:
      description: Retrieves a transcription for a specific video and generates a
        presigned download URL.
